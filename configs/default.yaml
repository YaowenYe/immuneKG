# ============================================================
# immuneKG project configuration file
# KG backend | five-dimensional disease feature fusion
# ============================================================

# ---- Project info ----
project:
  name: "immuneKG"
  version: "2.0.0"
  description: "Immune disease drug target discovery via KG embedding and multi-dimensional feature fusion"

# ---- Data paths ----
data:
  # Pre-split KG files
  # Place train.tsv / valid.tsv / test.tsv in the data/ directory
  train_path: "data/train.tsv"
  valid_path: "data/valid.tsv"
  test_path:  "data/test.tsv"

  # Five-dimensional disease feature files (keyed by mondo_id)
  feature_dir: "data/"
  feature_files:
    gwas_genetic:       "gwas_genetic_features.csv"
    hpo_organ:          "hpo_organ_features.csv"
    hpo_phenotype:      "hpo_phenotype_stats.csv"
    iedb_onehot:        "iedb_onehot_features.csv"
    iedb_statistical:   "iedb_statistical_features.csv"

  # KG entities are lowercase names (e.g., "colitis"), not mondo_id numbers;
  # feature_encoder uses disease names for mapping; this field is retained for compatibility
  mondo_id_prefix: ""

  # IBD disease entity name -> mondo_id mapping
  # Links KG disease nodes to five-dimensional feature files (mondo_id key)
  # Format: {kg_entity_name: mondo_id_string}
  kg_to_mondo:
    "colitis":                    "0005101"
    "ulcerative colitis":         "0005101"
    "inflammatory bowel diseases": "0004982"
    "enterocolitis":              "0006805"
    "crohn disease":              "0005011"

# ---- KG embedding model config ----
model:
  kg_model: "ComplEx"
  embedding_dim: 128

  fusion:
    hidden_dims: [256, 128]
    dropout: 0.3
    activation: "relu"
    use_batch_norm: true
    fusion_strategy: "gate"

training:
  kg:
    num_epochs: 300        
    batch_size: 512
    learning_rate: 0.001
    optimizer: "Adam"
    create_inverse_triples: true   
    training_loop: "sLCWA"
    negative_sampler: "basic"
    negative_sampler_kwargs:
      num_negs_per_pos: 32
    loss: "SoftplusLoss"
    regularizer: "LpRegularizer"
    regularizer_kwargs:
      p: 3
      weight: 0.00001
    stopper: "early"
    stopper_kwargs:
      frequency: 10
      patience: 10
      relative_delta: 0.002
    train_ratio: 0.8       
    random_seed: 42
    use_presplit: true      

  fusion:
    num_epochs: 80
    batch_size: 128
    learning_rate: 0.0005
    weight_decay: 0.0001
    patience: 15
    min_delta: 0.0001
    random_seed: 42

evaluation:
  batch_size: 256
  filtered: true
  hits_at_ks: [1, 3, 5, 10, 100]
  metrics:
    - "mean_reciprocal_rank"
    - "hits_at_1"
    - "hits_at_3"
    - "hits_at_5"
    - "hits_at_10"
    - "hits_at_100"

prediction:
  target_diseases:
    - "ulcerative colitis"
    - "inflammatory bowel diseases"
    - "colitis"

  autoimmune_keywords:
    - "rheumatoid arthritis"
    - "lupus"
    - "multiple sclerosis"
    - "type 1 diabetes"
    - "psoriasis"
    - "inflammatory bowel"
    - "colitis"
    - "crohn"
    - "celiac"
    - "sjogren"
    - "scleroderma"
    - "myasthenia"
    - "autoimmune"
    - "diabetes"
    - "sclerosis"

  target_entity_types:
    - "gene/protein"

  top_k: 50

output:
  work_dir: "./results"
  filenames:
    processed_data:     "processed_kg.pkl"
    triples_factory:    "triples_factory.pkl"
    disease_features:   "disease_features.pkl"
    kg_model:           "kg_model.pkl"
    kg_weights:         "kg_model_weights.pth"
    fusion_model:       "fusion_model.pth"
    fusion_config:      "fusion_config.json"
    target_scores:      "target_scores.csv"
    prediction_report:  "prediction_report.csv"
    training_log:       "training_log.json"
    timing:             "timing.json"

gpu:
  device_id: "5"
  auto_select: false

gnn:
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.2
  pna:
    aggregators: ["mean", "max", "min", "std"]
    scalers: ["identity", "amplification", "attenuation"]
  training:
    num_epochs: 50
    batch_size: 1024
    learning_rate: 0.001
    num_neighbors: [10, 5]
    recon_weight: 0.5
    ap_weight: 0.1
    force_cpu: true         

novelty:
  enable: true
  penalty_weight: 1.0
  degree_log_base: 1
  min_degree_threshold: 0
